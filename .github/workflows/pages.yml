name: Deploy research explorer (GitHub Pages)

# Publishes the INGREDIENTS-ONLY ("--public") build to public GitHub Pages.
# Competitor/market/strategy docs are excluded. MANUAL-ONLY: the default hosting
# is private/gated (see site/HOSTING.md); run this workflow by hand only if you
# ever decide to publish the science publicly. Requires Pages enabled with the
# "GitHub Actions" source (Settings → Pages), which on a private repo needs a paid plan.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install markdown
      - name: Build ingredients-only public site
        run: python site/build.py --public
      - run: touch site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
